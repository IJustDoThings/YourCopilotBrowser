<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Support – YCB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #202124; color: #e8eaed;
      font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 14px; height: 100vh; display: flex; flex-direction: column;
    }
    header {
      background: #292a2d; border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 14px 24px; flex-shrink: 0;
    }
    header h1 { font-size: 18px; font-weight: 500; }
    header p  { font-size: 12px; color: #9aa0a6; margin-top: 2px; }

    /* ── NEW TICKET FORM ── */
    #new-ticket {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .form-card {
      width: 100%; max-width: 540px; background: #292a2d;
      border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 28px;
    }
    .form-card h2 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
    .form-card p  { font-size: 13px; color: #9aa0a6; margin-bottom: 22px; line-height: 1.6; }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #9aa0a6; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
    input[type=text], textarea {
      width: 100%; background: #202124; border: 1px solid #3d3e4a;
      border-radius: 8px; padding: 9px 12px; color: #e8eaed;
      font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s;
    }
    input[type=text]:focus, textarea:focus { border-color: #8ab4f8; }
    textarea { resize: vertical; min-height: 100px; }
    .btn-primary {
      background: #8ab4f8; color: #111; border: none;
      border-radius: 8px; padding: 10px 24px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: opacity 0.15s; width: 100%; margin-top: 4px;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .form-status { margin-top: 12px; font-size: 13px; min-height: 18px; }

    /* ── CONVERSATION VIEW ── */
    #conversation { flex: 1; display: none; flex-direction: column; overflow: hidden; }
    .ticket-bar {
      background: #292a2d; border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 10px 20px; font-size: 12px; color: #9aa0a6; flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
    }
    .ticket-bar strong { color: #e8eaed; }
    .badge {
      background: #1a3a5c; color: #8ab4f8; border-radius: 4px;
      padding: 1px 6px; font-size: 11px; font-weight: 600;
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .bubble-row { display: flex; }
    .bubble-row.user  { justify-content: flex-end; }
    .bubble-row.support { justify-content: flex-start; }
    .bubble {
      max-width: 72%; padding: 10px 14px; border-radius: 16px;
      font-size: 13px; line-height: 1.55; white-space: pre-wrap; word-break: break-word;
    }
    .bubble-row.user    .bubble { background: #1a3a5c; color: #e8eaed; border-bottom-right-radius: 4px; }
    .bubble-row.support .bubble { background: #2a2b36; color: #e8eaed; border-bottom-left-radius: 4px; }
    .bubble-meta { font-size: 11px; color: #5f6368; margin-top: 3px; text-align: right; }
    .bubble-row.support .bubble-meta { text-align: left; }
    .system-msg { text-align: center; font-size: 12px; color: #5f6368; padding: 4px 0; }
    #reply-area {
      border-top: 1px solid rgba(255,255,255,0.07); padding: 12px 16px;
      display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
      background: #202124;
    }
    #reply-input {
      flex: 1; background: #2a2b36; border: 1px solid #3d3e4a;
      border-radius: 20px; padding: 10px 16px; color: #e8eaed;
      font-size: 13px; font-family: inherit; outline: none;
      resize: none; max-height: 120px; overflow-y: auto;
      transition: border-color 0.15s; line-height: 1.4;
    }
    #reply-input:focus { border-color: #8ab4f8; }
    .btn-send {
      background: #8ab4f8; border: none; border-radius: 50%;
      width: 36px; height: 36px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s;
    }
    .btn-send:hover { opacity: 0.85; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-send svg { pointer-events: none; }
    .err { color: #f28b82; }
    .ok  { color: #81c995; }
  </style>
</head>
<body>
  <header>
    <h1>Support</h1>
    <p>YCB Support — we usually respond within 24 hours</p>
  </header>

  <!-- NEW TICKET -->
  <div id="new-ticket">
    <div class="form-card">
      <h2>Start a conversation</h2>
      <p>Describe your issue and we'll get back to you. Your User ID is attached automatically so we can look up your logs.</p>
      <div class="field">
        <label>Subject</label>
        <input type="text" id="subject" placeholder="Brief description" maxlength="120">
      </div>
      <div class="field">
        <label>Message</label>
        <textarea id="first-msg" placeholder="Describe what happened, steps to reproduce, etc…"></textarea>
      </div>
      <button class="btn-primary" id="btn-start">Start Conversation</button>
      <div class="form-status" id="form-status"></div>
    </div>
  </div>

  <!-- CONVERSATION -->
  <div id="conversation">
    <div class="ticket-bar">
      <span>Ticket <strong id="ticket-id-label">—</strong></span>
      <span class="badge" id="ticket-subject-label"></span>
    </div>
    <div id="messages"></div>
    <div id="reply-area">
      <textarea id="reply-input" rows="1" placeholder="Type a message…"></textarea>
      <button class="btn-send" id="btn-send">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M1 8 L14 2 L9 8 L14 14 Z" fill="#111"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const api = msg => {
      if (window.chrome && window.chrome.webview)
        window.chrome.webview.postMessage(msg);
    };

    let _ticketId = null;
    let _knownCount = 0;
    let _pollTimer = null;
    let _userId = '';

    window.setUserId = id => { _userId = id; };

    // ── CREATE TICKET ──
    document.getElementById('btn-start').addEventListener('click', () => {
      const subject = document.getElementById('subject').value.trim();
      const message = document.getElementById('first-msg').value.trim();
      if (!subject || !message) {
        setFormStatus('Please fill in both fields.', false);
        return;
      }
      const btn = document.getElementById('btn-start');
      btn.disabled = true; btn.textContent = 'Sending…';
      setFormStatus('', true);
      api({ type: 'support:create', subject, message });
    });

    window.onTicketCreated = (data, statusCode) => {
      _ticketId = data.ticketId || data.id || data.TicketId || String(statusCode);
      const subject = document.getElementById('subject').value.trim();
      const firstMsg = document.getElementById('first-msg').value.trim();

      document.getElementById('ticket-id-label').textContent = _ticketId;
      document.getElementById('ticket-subject-label').textContent = subject;

      document.getElementById('new-ticket').style.display = 'none';
      const conv = document.getElementById('conversation');
      conv.style.display = 'flex';

      appendBubble('user', firstMsg);
      appendSystem('Ticket created — we\'ll reply here shortly.');
      startPolling();
    };

    window.onTicketError = (statusCode, errMsg) => {
      const btn = document.getElementById('btn-start');
      btn.disabled = false; btn.textContent = 'Start Conversation';
      if (statusCode === 404) {
        setFormStatus('Service not found (404). Please try again later.', false);
      } else if (statusCode === 0) {
        setFormStatus('No connection. Check your internet and try again.', false);
      } else {
        setFormStatus(`Failed to create ticket (${statusCode}). Please try again.`, false);
      }
    };

    // ── SEND REPLY ──
    const replyInput = document.getElementById('reply-input');
    document.getElementById('btn-send').addEventListener('click', sendReply);
    replyInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
    });
    replyInput.addEventListener('input', () => {
      replyInput.style.height = 'auto';
      replyInput.style.height = Math.min(replyInput.scrollHeight, 120) + 'px';
    });

    function sendReply() {
      const text = replyInput.value.trim();
      if (!text || !_ticketId) return;
      const btn = document.getElementById('btn-send');
      btn.disabled = true;
      replyInput.value = ''; replyInput.style.height = 'auto';
      appendBubble('user', text);
      api({ type: 'support:reply', ticketId: _ticketId, message: text });
    }

    window.onReplyResult = (ok, statusCode) => {
      document.getElementById('btn-send').disabled = false;
      if (!ok) {
        if (statusCode === 404) appendSystem('⚠ Ticket no longer exists (404).', true);
        else appendSystem('⚠ Failed to send reply. Check connection.', true);
      }
    };

    // ── POLLING ──
    function startPolling() {
      if (_pollTimer) clearInterval(_pollTimer);
      _pollTimer = setInterval(poll, 5000);
    }

    function poll() {
      if (!_ticketId) return;
      api({ type: 'support:poll', ticketId: _ticketId });
    }

    window.onPollResult = (data, statusCode) => {
      if (statusCode === 404) {
        clearInterval(_pollTimer);
        appendSystem('⚠ This ticket has been deleted (404).', true);
        return;
      }
      if (!data || !data.messages) return;
      const msgs = data.messages;
      if (msgs.length > _knownCount) {
        for (let i = _knownCount; i < msgs.length; i++) {
          const m = msgs[i];
          if (m.from === 'support') appendBubble('support', m.text, m.sentAt);
        }
        _knownCount = msgs.length;
      }
    };

    // ── UI HELPERS ──
    function appendBubble(from, text, time) {
      const row = document.createElement('div');
      row.className = `bubble-row ${from}`;
      const wrap = document.createElement('div');
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      const meta = document.createElement('div');
      meta.className = 'bubble-meta';
      meta.textContent = time ? new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : now();
      wrap.appendChild(bubble);
      wrap.appendChild(meta);
      row.appendChild(wrap);
      document.getElementById('messages').appendChild(row);
      scrollBottom();
      _knownCount = Math.max(_knownCount, document.querySelectorAll('.bubble-row').length);
    }

    function appendSystem(text, isErr) {
      const el = document.createElement('div');
      el.className = 'system-msg' + (isErr ? ' err' : '');
      el.textContent = text;
      document.getElementById('messages').appendChild(el);
      scrollBottom();
    }

    function scrollBottom() {
      const m = document.getElementById('messages');
      m.scrollTop = m.scrollHeight;
    }

    function setFormStatus(msg, ok) {
      const el = document.getElementById('form-status');
      el.textContent = msg;
      el.className = 'form-status ' + (ok ? 'ok' : 'err');
    }

    function now() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Request user ID on load
    api({ type: 'support:getUserId' });
  </script>
</body>
</html>
