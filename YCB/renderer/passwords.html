<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: blob:">
  <title>Password Manager – YCB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #202124; color: #e8eaed;
      font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 14px; min-height: 100vh;
    }
    header {
      position: sticky; top: 0; z-index: 10;
      background: #292a2d; border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 18px 32px 14px;
    }
    header h1 { font-size: 22px; font-weight: 400; margin-bottom: 6px; }
    header p { font-size: 13px; color: #9aa0a6; }

    #content { max-width: 700px; margin: 0 auto; padding: 30px 16px 60px; }

    /* Lock screen */
    #lock-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; text-align: center;
    }
    #lock-screen .lock-icon {
      width: 64px; height: 64px; margin-bottom: 20px; opacity: 0.6;
    }
    #lock-screen h2 { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
    #lock-screen p { font-size: 13px; color: #9aa0a6; margin-bottom: 24px; max-width: 320px; }
    
    .input-group {
      display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 300px;
      margin-bottom: 16px;
    }
    .input-group label { font-size: 12px; color: #9aa0a6; text-align: left; }
    .input-group input {
      background: #3c4043; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 12px 14px; color: #e8eaed;
      font-size: 14px; outline: none; width: 100%;
    }
    .input-group input:focus { border-color: #8ab4f8; }
    .input-group input::placeholder { color: #6e6e6e; }

    .btn-primary {
      background: #8ab4f8; color: #202124; border: none;
      border-radius: 8px; padding: 12px 28px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: #aecbfa; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: transparent; color: #8ab4f8; border: 1px solid #8ab4f8;
      border-radius: 8px; padding: 10px 20px; font-size: 13px;
      cursor: pointer; transition: background 0.15s; margin-top: 12px;
    }
    .btn-secondary:hover { background: rgba(138,180,248,0.1); }

    .error-msg {
      color: #f28b82; font-size: 13px; margin-top: 12px;
      min-height: 20px;
    }

    /* Password list */
    #password-list { display: none; }
    #password-list.visible { display: block; }

    .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
    .search-wrap {
      flex: 1; display: flex; align-items: center; gap: 8px;
      background: #3c4043; border-radius: 8px; padding: 9px 12px;
    }
    .search-wrap svg { flex-shrink: 0; opacity: 0.5; }
    .search-wrap input {
      background: none; border: none; outline: none;
      color: #e8eaed; font-size: 14px; width: 100%;
    }
    .search-wrap input::placeholder { color: #9aa0a6; }

    .btn-lock {
      background: transparent; border: 1px solid rgba(255,255,255,0.15);
      color: #e8eaed; border-radius: 8px; padding: 9px 16px;
      font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .btn-lock:hover { background: rgba(255,255,255,0.07); }

    .pw-entry {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: 10px;
      background: #292a2d; margin-bottom: 10px;
      transition: background 0.12s;
    }
    .pw-entry:hover { background: #333437; }

    .pw-favicon {
      width: 32px; height: 32px; border-radius: 6px;
      background: #3c4043; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .pw-favicon img { width: 20px; height: 20px; object-fit: contain; }
    .pw-favicon svg { opacity: 0.4; }

    .pw-info { flex: 1; min-width: 0; }
    .pw-site { font-weight: 500; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pw-user { font-size: 12px; color: #9aa0a6; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .pw-actions { display: flex; gap: 6px; }
    .pw-btn {
      background: rgba(255,255,255,0.06); border: none; border-radius: 6px;
      width: 34px; height: 34px; cursor: pointer; color: #9aa0a6;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .pw-btn:hover { background: rgba(255,255,255,0.12); color: #e8eaed; }
    .pw-btn.danger:hover { background: rgba(242,139,130,0.2); color: #f28b82; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: #6e6e6e;
    }
    .empty-state svg { opacity: 0.3; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; color: #9aa0a6; }

    /* Modal for viewing password */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: #2d2e32; border-radius: 12px; padding: 24px;
      min-width: 340px; max-width: 90vw;
    }
    .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: 11px; color: #9aa0a6; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .modal-field .value {
      background: #3c4043; border-radius: 6px; padding: 10px 12px;
      font-family: monospace; font-size: 13px; word-break: break-all;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .modal-field .value span { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .copy-btn {
      background: none; border: none; color: #8ab4f8; cursor: pointer;
      padding: 4px; border-radius: 4px; flex-shrink: 0;
    }
    .copy-btn:hover { background: rgba(138,180,248,0.15); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .btn-modal {
      background: rgba(255,255,255,0.08); border: none; border-radius: 6px;
      padding: 10px 18px; color: #e8eaed; cursor: pointer; font-size: 13px;
    }
    .btn-modal:hover { background: rgba(255,255,255,0.12); }
    .btn-modal.danger { color: #f28b82; }
    .btn-modal.danger:hover { background: rgba(242,139,130,0.15); }

    /* Add password modal */
    .add-modal .modal { min-width: 380px; }
    .add-field { margin-bottom: 16px; }
    .add-field label { display: block; font-size: 11px; color: #9aa0a6; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .add-field input {
      width: 100%; background: #3c4043; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 11px 14px; color: #e8eaed;
      font-size: 14px; outline: none;
    }
    .add-field input:focus { border-color: #8ab4f8; }
    .add-field input::placeholder { color: #6e6e6e; }
    .pw-input-wrap { position: relative; }
    .pw-input-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #9aa0a6; cursor: pointer; padding: 4px;
    }
    .pw-toggle:hover { color: #e8eaed; }
    .btn-add-pw {
      background: rgba(138,180,248,0.12); border: 1px solid rgba(138,180,248,0.3);
      color: #8ab4f8; border-radius: 8px; padding: 9px 16px;
      font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .btn-add-pw:hover { background: rgba(138,180,248,0.2); }
    .add-error { color: #f28b82; font-size: 12px; margin-top: 8px; min-height: 18px; }
  </style>
</head>
<body>
  <header>
    <h1>🔐 Password Manager</h1>
    <p>Your saved passwords are encrypted and protected</p>
  </header>

  <div id="content">
    <!-- Lock Screen / Setup -->
    <div id="lock-screen">
      <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="5" y="11" width="14" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
        <circle cx="12" cy="16" r="1"/>
        <path d="M12 17v2"/>
      </svg>
      <h2 id="lock-title">Set Up Master Password</h2>
      <p id="lock-desc">Create a master password to protect your saved passwords. You'll need this to view them.</p>
      
      <div class="input-group" id="setup-fields">
        <label for="master-pw">Master Password</label>
        <input type="password" id="master-pw" placeholder="Enter master password">
      </div>
      <div class="input-group" id="confirm-group">
        <label for="confirm-pw">Confirm Password</label>
        <input type="password" id="confirm-pw" placeholder="Confirm master password">
      </div>
      
      <button class="btn-primary" id="btn-submit">Create Master Password</button>
      <div class="error-msg" id="error-msg"></div>
      
      <button class="btn-secondary" id="btn-reset" style="display:none">Reset Master Password</button>
    </div>

    <!-- Password List (shown after unlock) -->
    <div id="password-list">
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search passwords...">
        </div>
        <button class="btn-add-pw" id="btn-add-pw">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Add
        </button>
        <button class="btn-lock" id="btn-lock-now">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="5" y="11" width="14" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          Lock
        </button>
      </div>
      <div id="passwords-container"></div>
    </div>
  </div>

  <!-- View Password Modal -->
  <div class="modal-overlay" id="view-modal">
    <div class="modal">
      <h3 id="modal-site">Site</h3>
      <div class="modal-field">
        <label>Username</label>
        <div class="value">
          <span id="modal-user">—</span>
          <button class="copy-btn" data-copy="user" title="Copy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="modal-field">
        <label>Password</label>
        <div class="value">
          <span id="modal-pass">••••••••</span>
          <button class="copy-btn" data-copy="pass" title="Copy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-modal danger" id="btn-delete-pw">Delete</button>
        <button class="btn-modal" id="btn-close-modal">Close</button>
      </div>
    </div>
  </div>

  <!-- Add Password Modal -->
  <div class="modal-overlay add-modal" id="add-modal">
    <div class="modal">
      <h3>Add Password</h3>
      <div class="add-field">
        <label>Website</label>
        <input type="text" id="add-url" placeholder="example.com">
      </div>
      <div class="add-field">
        <label>Username / Email / Phone</label>
        <input type="text" id="add-user" placeholder="Enter username, email or phone">
      </div>
      <div class="add-field">
        <label>Password</label>
        <div class="pw-input-wrap">
          <input type="password" id="add-pass" placeholder="Enter password">
          <button class="pw-toggle" id="toggle-add-pass" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="add-error" id="add-error"></div>
      <div class="modal-actions">
        <button class="btn-modal" id="btn-cancel-add">Cancel</button>
        <button class="btn-modal" id="btn-save-add" style="background:#8ab4f8;color:#202124;font-weight:600">Save</button>
      </div>
    </div>
  </div>

  <script>
    const lockScreen = document.getElementById('lock-screen');
    const passwordList = document.getElementById('password-list');
    const lockTitle = document.getElementById('lock-title');
    const lockDesc = document.getElementById('lock-desc');
    const masterPwInput = document.getElementById('master-pw');
    const confirmPwInput = document.getElementById('confirm-pw');
    const confirmGroup = document.getElementById('confirm-group');
    const btnSubmit = document.getElementById('btn-submit');
    const btnReset = document.getElementById('btn-reset');
    const errorMsg = document.getElementById('error-msg');
    const searchInput = document.getElementById('search-input');
    const passwordsContainer = document.getElementById('passwords-container');
    const viewModal = document.getElementById('view-modal');
    const modalSite = document.getElementById('modal-site');
    const modalUser = document.getElementById('modal-user');
    const modalPass = document.getElementById('modal-pass');
    const btnCloseModal = document.getElementById('btn-close-modal');
    const btnDeletePw = document.getElementById('btn-delete-pw');
    const btnLockNow = document.getElementById('btn-lock-now');
    const addModal = document.getElementById('add-modal');
    const addUrlInput = document.getElementById('add-url');
    const addUserInput = document.getElementById('add-user');
    const addPassInput = document.getElementById('add-pass');
    const addError = document.getElementById('add-error');
    const btnAddPw = document.getElementById('btn-add-pw');
    const btnCancelAdd = document.getElementById('btn-cancel-add');
    const btnSaveAdd = document.getElementById('btn-save-add');
    const toggleAddPass = document.getElementById('toggle-add-pass');

    let isSetup = false;
    let currentPasswords = [];
    let currentViewUrl = null;
    let decryptedPasswords = {};

    // Check if master password is set up
    function checkSetup() {
      const stored = localStorage.getItem('ycb_master_hash');
      isSetup = !!stored;
      
      if (isSetup) {
        lockTitle.textContent = 'Unlock Password Manager';
        lockDesc.textContent = 'Enter your master password to view saved passwords.';
        confirmGroup.style.display = 'none';
        btnSubmit.textContent = 'Unlock';
        btnReset.style.display = 'block';
      } else {
        lockTitle.textContent = 'Set Up Master Password';
        lockDesc.textContent = 'Create a master password to protect your saved passwords. You\'ll need this to view them.';
        confirmGroup.style.display = 'flex';
        btnSubmit.textContent = 'Create Master Password';
        btnReset.style.display = 'none';
      }
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      setTimeout(() => { errorMsg.textContent = ''; }, 3000);
    }

    btnSubmit.addEventListener('click', () => {
      const pw = masterPwInput.value;
      
      if (!pw || pw.length < 4) {
        showError('Password must be at least 4 characters');
        return;
      }

      if (!isSetup) {
        // Setting up new master password
        const confirm = confirmPwInput.value;
        if (pw !== confirm) {
          showError('Passwords do not match');
          return;
        }
        localStorage.setItem('ycb_master_hash', hashPassword(pw));
        localStorage.setItem('ycb_master_key', encrypt('verified', pw));
        unlock(pw);
      } else {
        // Verifying existing password
        const storedKey = localStorage.getItem('ycb_master_key');
        if (decrypt(storedKey, pw) === 'verified') {
          unlock(pw);
        } else {
          showError('Incorrect master password');
        }
      }
    });

    masterPwInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (isSetup) btnSubmit.click();
        else confirmPwInput.focus();
      }
    });
    confirmPwInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btnSubmit.click();
    });

    btnReset.addEventListener('click', () => {
      if (confirm('This will delete all saved passwords. Are you sure?')) {
        localStorage.removeItem('ycb_master_hash');
        localStorage.removeItem('ycb_master_key');
        // Tell parent to clear passwords
        console.log('__passwords__:CLEAR_ALL');
        masterPwInput.value = '';
        confirmPwInput.value = '';
        checkSetup();
      }
    });

    let masterKey = null;

    function unlock(pw) {
      masterKey = pw;
      lockScreen.style.display = 'none';
      passwordList.classList.add('visible');
      loadPasswords();
    }

    function lock() {
      masterKey = null;
      decryptedPasswords = {};
      lockScreen.style.display = 'flex';
      passwordList.classList.remove('visible');
      masterPwInput.value = '';
      confirmPwInput.value = '';
    }

    btnLockNow.addEventListener('click', lock);

    // Add password modal
    btnAddPw.addEventListener('click', () => {
      addUrlInput.value = '';
      addUserInput.value = '';
      addPassInput.value = '';
      addError.textContent = '';
      addModal.classList.add('visible');
      setTimeout(() => addUrlInput.focus(), 50);
    });

    btnCancelAdd.addEventListener('click', () => addModal.classList.remove('visible'));
    addModal.addEventListener('click', (e) => { if (e.target === addModal) addModal.classList.remove('visible'); });

    toggleAddPass.addEventListener('click', () => {
      const isPass = addPassInput.type === 'password';
      addPassInput.type = isPass ? 'text' : 'password';
    });

    btnSaveAdd.addEventListener('click', () => {
      const url = addUrlInput.value.trim();
      const username = addUserInput.value.trim();
      const password = addPassInput.value;
      if (!url) { addError.textContent = 'Website is required'; return; }
      if (!password) { addError.textContent = 'Password is required'; return; }
      addError.textContent = '';
      console.log('__passwords__:ADD_MANUAL:' + JSON.stringify({ url, username, password }));
      addModal.classList.remove('visible');
    });

    async function loadPasswords() {
      // Request passwords from parent
      console.log('__passwords__:GET_ALL');
    }

    // Receive passwords from parent
    window.setPasswords = function(entries) {
      currentPasswords = entries || [];
      renderPasswords();
    };

    function renderPasswords() {
      const query = searchInput.value.toLowerCase();
      const filtered = currentPasswords.filter(p => 
        p.url.toLowerCase().includes(query) || 
        (p.username || '').toLowerCase().includes(query)
      );

      if (filtered.length === 0) {
        passwordsContainer.innerHTML = `
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="5" y="11" width="14" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <p>${currentPasswords.length === 0 ? 'No saved passwords yet' : 'No passwords match your search'}</p>
          </div>
        `;
        return;
      }

      passwordsContainer.innerHTML = filtered.map(p => {
        const domain = p.url.replace(/^https?:\/\//, '').replace(/\/$/, '');
        const favicon = `https://www.google.com/s2/favicons?sz=32&domain_url=${encodeURIComponent(p.url)}`;
        return `
          <div class="pw-entry" data-key="${escapeHtml(p.key || p.url)}" data-url="${escapeHtml(p.url)}">
            <div class="pw-favicon">
              <img src="${favicon}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
              <svg style="display:none" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <circle cx="12" cy="12" r="10"/>
              </svg>
            </div>
            <div class="pw-info">
              <div class="pw-site">${escapeHtml(domain)}</div>
              <div class="pw-user">${escapeHtml(p.username || '(no username)')}</div>
            </div>
            <div class="pw-actions">
              <button class="pw-btn" data-action="view" title="View">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
              <button class="pw-btn" data-action="copy" title="Copy password">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2"/>
                  <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
              </button>
              <button class="pw-btn danger" data-action="delete" title="Delete">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                  <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/>
                </svg>
              </button>
            </div>
          </div>
        `;
      }).join('');

      // Attach events
      passwordsContainer.querySelectorAll('.pw-entry').forEach(el => {
        const key = el.dataset.key;
        const url = el.dataset.url;
        el.querySelector('[data-action="view"]').addEventListener('click', () => showViewModal(key, url));
        el.querySelector('[data-action="copy"]').addEventListener('click', () => copyPassword(key));
        el.querySelector('[data-action="delete"]').addEventListener('click', () => deletePassword(key));
      });
    }

    searchInput.addEventListener('input', renderPasswords);

    function showViewModal(key, url) {
      const entry = currentPasswords.find(p => (p.key || p.url) === key);
      if (!entry) return;
      
      currentViewUrl = key;
      const domain = url.replace(/^https?:\/\//, '').replace(/\/$/, '');
      modalSite.textContent = domain;
      modalUser.textContent = entry.username || '(none)';
      
      // Decrypt and show password
      const decrypted = entry.password; // Already decrypted by main process
      modalPass.textContent = decrypted;
      
      viewModal.classList.add('visible');
    }

    btnCloseModal.addEventListener('click', () => {
      viewModal.classList.remove('visible');
      currentViewUrl = null;
    });

    viewModal.addEventListener('click', (e) => {
      if (e.target === viewModal) {
        viewModal.classList.remove('visible');
        currentViewUrl = null;
      }
    });

    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.copy;
        const text = type === 'user' ? modalUser.textContent : modalPass.textContent;
        navigator.clipboard.writeText(text);
        btn.innerHTML = '✓';
        setTimeout(() => {
          btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>`;
        }, 1000);
      });
    });

    btnDeletePw.addEventListener('click', () => {
      if (currentViewUrl && confirm('Delete this password?')) {
        deletePassword(currentViewUrl);
        viewModal.classList.remove('visible');
        currentViewUrl = null;
      }
    });

    function copyPassword(key) {
      const entry = currentPasswords.find(p => (p.key || p.url) === key);
      if (entry) {
        navigator.clipboard.writeText(entry.password);
      }
    }

    function deletePassword(key) {
      console.log('__passwords__:DELETE:' + key);
      currentPasswords = currentPasswords.filter(p => (p.key || p.url) !== key);
      renderPasswords();
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Init
    checkSetup();
  </script>
</body>
</html>
